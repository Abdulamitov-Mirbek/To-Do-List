services:
  postgres:
    image: postgres:16-alpine
    container_name: todolist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mirbek777389866
      POSTGRES_DB: credit_scoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credit_scoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: todolist-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:mirbek777389866@postgres:5432/credit_scoring?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_REFRESH_SECRET: your-refresh-token-secret-key-different-from-jwt
      JWT_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: production
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "3001:3000"
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
